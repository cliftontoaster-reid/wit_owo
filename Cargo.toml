[package]
name = "wit_owo"
version = "0.1.1"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Finally, an adequate library for wit.ai in Rust."
readme = "README.md"
homepage = "https://github.com/cliftontoaster-reid/wit_owo"
repository = "https://github.com/cliftontoaster-reid/wit_owo"
exclude = ["owo"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-trait = "0.1.74"
reqwest = { version = "0.11.22", features = ["async-compression", "gzip", "json", "rustls-tls", "serde_json", "trust-dns"] }
serde_json = "1.0.107"
tokio = { version = "1.33.0", features = ["full"] }
serde = { version = "1.0.188", features = ["derive"] }
chrono = { version = "0.4.31", features = ["serde"] }
anyhow = "1.0.75"

[features]

[dev-dependencies]
dotenv = "0.15.0"
